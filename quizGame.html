}

.blink-text {
  animation: blink 1s infinite;

  0% {

  }
  50% {

  }
  100% {
    opacity: 1;
  }

.displayAnswers {

.result:hover
{

//options
function gameBegin() {
    qui.innerText = quitionsAll[0];
    options[0].forEach((element, index) => {
        document.getElementById(`btn${index + 1}`).innerText = element;
    });
}
gameBegin();

//levelUp and q/a change
function levelUp(score, inncorrectAns) {
    setTimeout(function () {
        if (score == 1 || inncorrectAns == 1) {
            qui.innerText = quitionsAll[1];
            // console.log(score, quitionCount);
            options[1].forEach((element, index) => {
                document.getElementById(`btn${index + 1}`).innerText = element;
            });
            console.log(score, inncorrectAns, "when your score 1 + 1");
        }
        if (score == 2 || inncorrectAns == 2) {
            qui.innerText = quitionsAll[2];
            // console.log(score, quitionCount);
            options[2].forEach((element, index) => {
                document.getElementById(`btn${index + 1}`).innerText = element;
            });
        }
        if (score == 3 || inncorrectAns == 3) {
            qui.innerText = quitionsAll[3];
            console.log(score, inncorrectAns);
            options[3].forEach((element, index) => {
                document.getElementById(`btn${index + 1}`).innerText = element;
            });
        }
        if (inncorrectAns >= 4) {
            setTimeout(function () {
                location.reload(); //reload page
            }, 4000);
            qui.innerText = `your score is ${score}!`;
            qui.innerText = `Not Good, Your Score Is ${score}`;

            correctClicked.forEach((element) => {
                display.innerHTML += `<li>${element}</li>`;
            });

            display.classList.add("displayAnswers");

            display.childNodes.forEach((item) => {
                if (item.innerText == "Delhi") {
                    item.style.color = "green";
                    item.style.fontWeight = "bold";
                } else if (item.innerText == "Jupiter") {
                    item.style.color = "green";
                    item.style.fontWeight = "bold";
                } else if (item.innerText == "Dr. Rajendra Prasad") {
                    item.style.color = "green";
                    item.style.fontWeight = "bold";
                } else if (item.innerText == "Tokyo") {
                    item.style.color = "green";
                    item.style.fontWeight = "bold";
                } else {
                    item.style.color = "red";
                }
            });

            btn.forEach((element) => {
                element.classList.add("btnNone");
            });
            if (score >= 4) {
                let soundCorrect = document.getElementById("correct");
                soundCorrect.volume = 1.0;
                soundCorrect.play();
                qui.innerText = `your score is ${score}!`;
                qui.classList.add("blink-text");
                qui.innerHTML = `Verry Good! <br> Your Score Is ${score}`;
                console.log("congrates");
            }
        }
    }, 700);
}
//* text blink when score is full

//pressBtn
function btnPress() {
    if (counter !== 4) {
        counter++;
        counterNumber.innerText = `${counter}/4`;
    }

    if (this.innerText == "Delhi") {
        correctClicked.push(this.innerText);
        console.log(correctClicked);
        this.style.backgroundColor = "green";
        setTimeout(function () {
            pera2.style.backgroundColor = "white";
        }, 250);
        score++;
        inncorrectAns++; // note

        console.log(`your first answer is correct ${score}`);
        levelUp(score, inncorrectAns);
    } else if (this.innerText == "Jupiter") {
        correctClicked.push(this.innerText);
        console.log(correctClicked);

        this.style.backgroundColor = "green";
        setTimeout(function () {
            pera3.style.backgroundColor = "white";
        }, 250);
        score++;
        inncorrectAns++; // note
        console.log(`your second answer is correct ${score}`);
        levelUp(score, inncorrectAns);
    } else if (this.innerText == "Dr. Rajendra Prasad") {
        correctClicked.push(this.innerText);
        console.log(correctClicked);

        this.style.backgroundColor = "green";
        setTimeout(function () {
            pera2.style.backgroundColor = "white";
        }, 250);
        score++;
        inncorrectAns++; // note

        console.log(`your third answer is correct ${score}`);
        levelUp(score, inncorrectAns);
    } else if (this.innerText == "Tokyo") {
        correctClicked.push(this.innerText);
        console.log(correctClicked);

        this.style.backgroundColor = "green";
        setTimeout(function () {
            pera3.style.backgroundColor = "white";
        }, 250);
        score++;
        inncorrectAns++; // note

        console.log(`your fourth answer is correct ${score}`);
        levelUp(score, inncorrectAns);
    } else if (
        this.innerText !== "Delhi" &&
        this.innerText !== "Jupiter" &&
        this.innerText !== "Dr. Rajendra Prasad" &&
        this.innerText !== "Tokyo"
    ) {
        correctClicked.push(this.innerText);
        console.log(correctClicked);

        inncorrectAns++; // note down
        console.log(
            score,
            inncorrectAns,
            "not click right answer you incorrect increased"
        );

        levelUp(score, inncorrectAns);
    } else {
        this.style.backgroundColor = "red";
        this.style.color = "white";
        console.log("wrong answer");
    }
}

for (buttons of btn) {
    buttons.addEventListener("click", btnPress);
}
